name: Super Cursor Verify

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Template layout + scaffold + runner smoke
        run: bash .cursor/bin/template-verify.sh
