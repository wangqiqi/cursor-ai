# Report Contract · scaffold placeholder (edit after apply)
# SSOT: test-report skill · reference/contract-schema.md

report:
  id: stack-benchmark
  doc_path: docs/test-report.md
  version: "0.1"
  title: Stack Test Report
  audiences:
    - engineering
    - qa

run:
  log_dir: data/tmp/test-report
  collect_script: bash scripts/docs/collect_test_report.sh
  suites:
    - id: verify_l1
      tier: l1
      label: L1 gate
      command: bash scripts/verify.sh --l1
      parse: verify_exit
    - id: unit
      tier: l1
      label: Unit tests
      command: bash scripts/test.sh
      parse: verify_exit

metadata:
  sprint_key: null
  environment_hint: local dev · no secrets in report

verify:
  l1_script: bash scripts/verify/docs/verify_test_report.sh
  anchors:
    - benchmark
    - verify.sh

delivery:
  include: false
  source: null
